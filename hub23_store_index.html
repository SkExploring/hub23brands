<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUB23 Brands Store</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#e8a020;
  --dark:#0f0f1a;
  --dark2:#1a1a2e;
}
body{margin:0;font-family:'DM Sans';background:var(--dark);color:#fff}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 30px;background:#0f0f1acc;backdrop-filter:blur(10px);z-index:10}
.logo{font-family:'Bebas Neue';color:var(--gold);font-size:26px}
nav a{color:#ccc;text-decoration:none;margin-left:20px}
.cta{background:var(--gold);padding:8px 18px;border-radius:6px;color:#fff}
.hero{height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero h1{font-family:'Bebas Neue';font-size:90px;letter-spacing:4px}
.hero span{color:var(--gold)}
.hero p{opacity:.7;margin:15px 0}
.banner{height:50vh;background:#111;display:flex;align-items:center;justify-content:center;font-size:30px;font-family:'Bebas Neue'}
.section{padding:60px 30px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:20px}
.card{background:var(--dark2);padding:15px;border-radius:10px;transition:.3s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:180px;object-fit:cover;border-radius:6px}
.card h3{margin:10px 0 5px}
.price{opacity:.7;font-size:14px}
.btn{display:block;margin-top:10px;background:var(--gold);text-align:center;padding:8px;border-radius:6px;color:#fff;text-decoration:none}
footer{text-align:center;padding:40px;background:#000}
</style>
</head>

<body>

<nav>
  <div class="logo">HUB23</div>
  <div>
    <a href="#footwear">Footwear</a>
    <a href="#clothing">Clothing</a>
    <a href="https://instagram.com/hub23brandsmandoli" target="_blank">Instagram</a>
    <a href="https://wa.me/917838124123" class="cta">WhatsApp</a>
  </div>
</nav>

<div class="hero">
  <h1>HUB<span>23</span></h1>
  <p>Premium Streetwear & Footwear Store</p>
</div>

<div class="banner">Latest Sneaker Drops</div>

<section class="section" id="footwear">
  <h2>Footwear</h2>
  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Nike Air</h3>
      <div class="price">₹4999</div>
      <a href="https://wa.me/917838124123?text=Hi, I'm interested in Nike Air from HUB23" class="btn">Enquire</a>
    </div>
  </div>
</section>

<section class="section" id="clothing">
  <h2>Clothing</h2>
  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Street Hoodie</h3>
      <div class="price">₹1999</div>
      <a href="https://wa.me/917838124123?text=Hi, I'm interested in Street Hoodie from HUB23" class="btn">Enquire</a>
    </div>
  </div>
</section>

<footer>
  <h2 style="font-family:Bebas Neue;color:#e8a020">HUB23 BRANDS</h2>
  <p>Mandoli Delhi · Premium Fashion Store</p>
</footer>

</body>
</html>
